name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  sast-scan:
    name: TP1 - Analyse du code
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Installer les dépendances
        run: npm install

      - name: Lancer les tests
        run: npm test

      - name: Audit des dépendances (SCA)
        run: npm audit --audit-level=high
        continue-on-error: true

  container-scan:
    name: TP2 - Scan conteneur Trivy
    runs-on: ubuntu-latest
    needs: sast-scan
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build image Docker
        run: docker build -t my-secure-app:${{ github.sha }} .

      - name: Scan Trivy (affichage tableau)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: my-secure-app:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Scan Trivy (rapport SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: my-secure-app:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif

      - name: Upload résultats GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  deploy-secrets:
    name: TP2 - Secrets sécurisés
    runs-on: ubuntu-latest
    needs: container-scan
    steps:
      - name: Utiliser les secrets GitHub
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "✅ Secrets chargés de manière sécurisée"
          echo "Image prête : my-secure-app:${{ github.sha }}"